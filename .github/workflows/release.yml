name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Embed version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"].removeprefix("v")
          path = Path("Sources/JUICore/BuildInfo.swift")
          source = path.read_text()
          source = re.sub(r'public static let version = ".*"', f'public static let version = "{version}"', source)
          path.write_text(source)
          PY
      - name: Test
        run: swift test
      - name: Build
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            swift build -c release --static-swift-stdlib
          else
            swift build -c release
          fi
      - name: Package
        shell: bash
        run: |
          mkdir -p dist/package
          cp .build/release/jui dist/package/jui
          chmod +x dist/package/jui
          platform=$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m)
          archive="jui-${platform}-${arch}.tar.gz"
          tar -C dist/package -czf "dist/$archive" jui
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "$archive" > "$archive.sha256")
          else
            (cd dist && shasum -a 256 "$archive" > "$archive.sha256")
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: jui-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
