name: ci

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Show Swift version
        run: swift --version
      - name: Test
        run: swift test
      - name: Build release binary
        run: swift build -c release
